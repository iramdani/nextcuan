<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="config.js?v=2026_3"></script>

    <script>
        (function() {
            const CACHE_KEY = 'cepat_global_settings';
            const CACHE_AGE = 60 * 60 * 1000; 

            function syncGlobalSettingsCache(data, timestamp, version) {
                if (!data) return;
                const payload = { data: data, time: Number(timestamp || Date.now()), version: String(version || '') };
                try { localStorage.setItem(CACHE_KEY, JSON.stringify(payload)); } catch(e){}
                if (window.__CEPAT_GLOBAL_SETTINGS__) {
                    window.__CEPAT_GLOBAL_SETTINGS__.cached = payload;
                    window.__CEPAT_GLOBAL_SETTINGS__.isFresh = true;
                    window.__CEPAT_GLOBAL_SETTINGS__.version = payload.version;
                }
                applyGlobalSettings(data);
            }

            function applyGlobalSettings(data) {
                // Eksekusi Cepat Favicon
                if(data.site_favicon) {
                    let link = document.querySelector("link[rel~='icon']");
                    if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
                    link.href = data.site_favicon;
                }
                
                // Auto Replace Text di Title Browser
                if(data.site_name) {
                    document.title = `Login Member - ${data.site_name}`;
                }

                const updateDomElements = () => {
                    // INJEKSI NAMA WEB
                    if(data.site_name) {
                        document.querySelectorAll('.dyn-site-name').forEach(el => {
                            el.innerText = data.site_name;
                        });
                        const logoImg = document.getElementById('dyn-site-logo');
                        if(logoImg && logoImg.alt === '') logoImg.alt = data.site_name;
                    }

                    if(data.site_logo) {
                        const img = document.getElementById('dyn-site-logo');
                        if (img) {
                            img.src = data.site_logo;
                            img.classList.remove('hidden');
                        }
                        const fb = document.getElementById('logo-fallback');
                        if (fb) fb.classList.add('hidden');
                    }
                };

                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', updateDomElements);
                } else {
                    updateDomElements();
                }
            }

            const cachedStr = localStorage.getItem(CACHE_KEY);
            let cached = null;
            try { cached = JSON.parse(cachedStr); } catch(e){}
            const now = Date.now();

            if (cached && cached.data) {
                applyGlobalSettings(cached.data);
            }

            window.__CEPAT_GLOBAL_SETTINGS__ = {
                key: CACHE_KEY,
                maxAge: CACHE_AGE,
                cached: cached,
                isFresh: !!(cached && cached.time && (now - cached.time <= CACHE_AGE)),
                version: String((cached && cached.version) || ''),
                apply: applyGlobalSettings,
                sync: syncGlobalSettingsCache
            };

            const cacheStatePromise = (window.CEPAT_CACHE_STATE && typeof window.CEPAT_CACHE_STATE.ensureFresh === 'function')
                ? window.CEPAT_CACHE_STATE.ensureFresh()
                : Promise.resolve(null);
            cacheStatePromise.then(cacheState => {
                const settingsVersion = String((cacheState && cacheState.settings) || '');
                const cachedVersion = String((cached && cached.version) || '');
                const shouldRefresh = !cached || !cached.time || (now - cached.time > CACHE_AGE) || (!!settingsVersion && cachedVersion !== settingsVersion);
                if (!shouldRefresh) return;
                if(typeof SCRIPT_URL === 'undefined') return;
                return fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'get_global_settings', cache_version: settingsVersion })
                })
                    .then(res => res.json())
                    .then(r => {
                        if(r.status === 'success') {
                            syncGlobalSettingsCache(r.data, Date.now(), String(r.cache_version || settingsVersion || ''));
                        }
                    });
            }).catch(e => console.error("Global Settings Sync Failed", e));
        })();
    </script>
    
    <script>
        // Redirect ke tujuan awal atau dashboard jika sudah login
        const checkExistingSession = () => {
            if(sessionStorage.getItem('user_email')) return true;
            try {
                const raw = localStorage.getItem('cepat_user_session');
                if(raw) {
                    const sess = JSON.parse(raw);
                    if(sess && sess.email) return true;
                }
            } catch(e) {}
            return false;
        };
        
        if(checkExistingSession()) {
            const redirectParams = new URLSearchParams(window.location.search);
            // Detect if admin
            let target = 'dashboard.html';
            try {
                const raw = localStorage.getItem('cepat_user_session');
                if(raw) {
                    const sess = JSON.parse(raw);
                    if(sess && sess.isAdmin) target = 'admin-area.html';
                }
            } catch(e) {}
            window.location.href = redirectParams.get('redirect') || target;
        }
    </script>

    <title>Login Member</title>
    
    <link rel="preload" as="style" href="tailwind.css?v=2026_3">
    <link rel="stylesheet" href="tailwind.css?v=2026_3">
    <link rel="stylesheet" href="assets/theme.css?v=2026_3">
    <script defer src="assets/vendor/lucide.min.js?v=0.577.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .brand-badge { box-shadow: 0 8px 20px -8px rgba(182,255,0,.35); background: var(--color-primary); color: #000; }

        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .toast { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; color: white; opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3); max-width: 350px; line-height: 1.4; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background-color: #019582; }
        .toast.error { background-color: #ef4444; }
        .toast.warning { background-color: #f59e0b; }
    </style>

<body class="min-h-screen relative overflow-hidden antialiased">

    <div id="toast-container"></div>

    <div class="absolute -top-24 -right-24 w-96 h-96 bg-[#017A6B]/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-[#B6FF00]/10 rounded-full blur-3xl pointer-events-none"></div>

    <main class="min-h-screen flex items-center justify-center p-6">
      <div class="w-full max-w-xl">
        <div class="mb-6 flex items-center justify-center gap-3">
            <img id="dyn-site-logo" src="" alt="" class="h-10 w-auto hidden select-none" loading="lazy">
            <div id="logo-fallback" class="w-10 h-10 rounded-xl flex items-center justify-center brand-badge">
                <i data-lucide="cpu" class="w-5 h-5"></i>
            </div>
            <div>
                <p class="text-xs font-bold tracking-widest text-[#B6FF00] uppercase">SELAMAT DATANG DI</p>
                <h1 class="text-xl font-extrabold tracking-tight text-white dyn-site-name">
                    <span class="opacity-0">Loading...</span>
                </h1>
            </div>
        </div>

        <div class="glass-card glow-primary p-8 md:p-10 rounded-[2rem]">
            <p class="text-center text-slate-400 text-sm mb-8">Login untuk mengakses dashboard.</p>
        
            <form id="form-login" class="space-y-5">
                <div class="space-y-2 glass-form-group text-left">
                    <label class="ml-1 text-[10px] font-bold uppercase tracking-wider text-slate-400">Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="email" class="glass-input w-full outline-none" style="padding-left: 2.75rem !important; padding-right: 1rem; padding-top: 1rem; padding-bottom: 1rem;" placeholder="nama@email.com" required>
                    </div>
                </div>
                <div class="space-y-2 glass-form-group text-left">
                    <div class="flex items-center justify-between">
                        <label class="ml-1 text-[10px] font-bold uppercase tracking-wider text-slate-400">Password</label>
                        <button type="button" onclick="(function(m){m.classList.remove('hidden');m.classList.add('flex');})(document.getElementById('modal-forgot'))" class="text-[10px] font-bold text-[#B6FF00] hover:text-white uppercase tracking-wider">Lupa Password?</button>
                    </div>
                    <div class="relative">
                        <i data-lucide="lock" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="pass" class="glass-input w-full outline-none" style="padding-left: 2.75rem !important; padding-right: 3rem; padding-top: 1rem; padding-bottom: 1rem;" placeholder="••••••••" required>
                        <button type="button" id="toggle-pass" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#B6FF00] hover:text-white p-2">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="btn-login" class="btn-primary w-full py-4 text-xs font-bold tracking-widest mt-4 uppercase">
                    MASUK
                </button>
            </form>
            <div class="mt-4 text-center">
                <p class="text-xs text-slate-400">Belum punya akun? <a href="signup.html" class="font-bold text-[#B6FF00] hover:text-white transition-colors">Daftar sekarang</a></p>
            </div>
            <div class="mt-6 text-center">
                <a href="index.html" class="text-slate-400 text-xs font-bold hover:text-[#B6FF00] transition-colors">&larr; Kembali ke Beranda</a>
            </div>
        </div>
      </div>
    </main>

    <!-- Modal Forgot Password -->
    <div id="modal-forgot" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md hidden p-4">
        <div class="glass-card w-full max-w-md p-6 relative glow-primary text-left">
            <button onclick="(function(m){m.classList.add('hidden');m.classList.remove('flex');})(document.getElementById('modal-forgot'))" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            
            <h3 class="text-lg font-bold text-white mb-2">Lupa Password?</h3>
            <p class="text-sm text-slate-400 mb-6">Masukkan email Anda. Kami akan mengirimkan password ke email yang terdaftar.</p>
            
            <form id="form-forgot" class="space-y-4">
                <div class="relative glass-form-group">
                    <i data-lucide="mail" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="email" id="email-forgot" class="glass-input w-full outline-none" style="padding-left: 2.75rem !important; padding-right: 1rem; padding-top: 0.8rem; padding-bottom: 0.8rem;" placeholder="nama@email.com" required>
                </div>
                
                <button type="submit" id="btn-forgot" class="btn-primary w-full py-3 text-xs tracking-widest mt-2">
                    Kirim Password
                </button>
            </form>
        </div>
    </div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'check-circle';
            if (type === 'error') icon = 'x-circle';
            if (type === 'warning') icon = 'alert-triangle';

            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 flex-shrink-0"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', ()=>{ lucide.createIcons(); });
        const toggleBtn = document.getElementById('toggle-pass');
        if(toggleBtn){
            toggleBtn.addEventListener('click', ()=>{
                const input = document.getElementById('pass');
                const isPw = input.getAttribute('type') === 'password';
                input.setAttribute('type', isPw ? 'text' : 'password');
                toggleBtn.innerHTML = isPw ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' : '<i data-lucide="eye" class="w-5 h-5"></i>';
                lucide.createIcons({ root: toggleBtn });
            });
        }

        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login'); 
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Memverifikasi...'; btn.disabled = true; lucide.createIcons({ root: btn });

            try {
                if(typeof SCRIPT_URL === 'undefined') throw new Error("Config.js tidak terpanggil!");
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', body: JSON.stringify({ action: 'login_and_dashboard', email: document.getElementById('email').value, password: document.getElementById('pass').value })
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    const role = String((r.data && r.data.role) || 'member').toLowerCase();
                    const nama = String((r.data && r.data.nama) || 'Member');
                    const email = String((r.data && r.data.email) || '');
                    const uid = String((r.data && r.data.id) || '');

                    // Unified session contract
                    sessionStorage.setItem('auth_v1', 'true');
                    sessionStorage.setItem('auth_role', role);
                    sessionStorage.setItem('auth_name', nama);
                    if (email) sessionStorage.setItem('auth_email', email);
                    if (uid) sessionStorage.setItem('auth_user_id', uid);

                    // Legacy compatibility keys
                    sessionStorage.setItem('user_email', r.data.email);
                    sessionStorage.setItem('user_nama', r.data.nama);
                    sessionStorage.setItem('user_id', r.data.id);
                    localStorage.setItem('cepat_user_session', JSON.stringify({
                        email: r.data.email, 
                        nama: r.data.nama, 
                        id: r.data.id,
                        isAdmin: role === 'admin',
                        token: r.data.session_token || r.data.token || ''
                    }));

                    showToast("Login Berhasil! Mengalihkan...", "success");

                    const bootAt = Date.now();
                    if (r.dashboard) {
                        const combined = {
                            ...r.dashboard.products,
                            pages: r.dashboard.pages,
                            settings: r.dashboard.settings,
                            user: r.dashboard.user,
                            affiliate_pixels: r.dashboard.affiliate_pixels
                        };
                        localStorage.setItem('cepat_dashboard_data_' + r.data.email, JSON.stringify({ data: combined, time: bootAt }));
                        sessionStorage.setItem('dashboard_bootstrap_time', String(bootAt));
                        if (r.dashboard.settings) {
                            localStorage.setItem('cepat_global_settings', JSON.stringify({ data: r.dashboard.settings, time: bootAt }));
                        }
                    }

                    // Redirect setelah toast terlihat sebentar
                    const minDelay = new Promise(resolve => setTimeout(resolve, 800));
                    minDelay.then(() => {
                        const redirectParams = new URLSearchParams(window.location.search);
                        window.location.href = redirectParams.get('redirect') || 'dashboard.html';
                    });
                } else { 
                    showToast(r.message, "error"); 
                    btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons({ root: btn });
                }
            } catch (err) { 
                showToast('Gagal koneksi server!', 'error'); 
                btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons({ root: btn });
            }
        };

        document.getElementById('form-forgot').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-forgot');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Mengirim...'; btn.disabled = true; lucide.createIcons({ root: btn });

            try {
                if(typeof SCRIPT_URL === 'undefined') throw new Error("Config.js tidak terpanggil!");
                const res = await fetch(SCRIPT_URL, { 
                    method: 'POST', body: JSON.stringify({ action: 'forgot_password', email: document.getElementById('email-forgot').value })
                });
                const r = await res.json();
                
                if(r.status === 'success') {
                    showToast(r.message, "success");
                    document.getElementById('modal-forgot').classList.add('hidden');
                    document.getElementById('email-forgot').value = '';
                } else {
                    showToast(r.message, "error");
                }
            } catch (err) {
                showToast('Gagal koneksi server!', 'error');
            } finally {
                btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons({ root: btn });
            }
        };
    </script>
</body>
</html>
