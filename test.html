<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Akses Produk - Test</title>
    <!-- Tailwind for rapid premium layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A; /* Deep Navy Dark */
            color: #F8FAFC;
            background-image: 
                radial-gradient(at 0% 0%, rgba(182, 255, 0, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(182, 255, 0, 0.03) 0px, transparent 50%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-premium {
            background-color: #B6FF00;
            color: #000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(182, 255, 0, 0.2);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(182, 255, 0, 0.4);
            filter: brightness(1.1);
        }

        .btn-premium:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-card max-w-lg w-full rounded-[2.5rem] p-10 text-center">
        <div class="w-20 h-20 bg-[rgba(182,255,0,0.1)] rounded-[2rem] flex items-center justify-center mx-auto mb-8">
            <i data-lucide="package" class="w-10 h-10 text-[#B6FF00]"></i>
        </div>

        <h1 class="text-3xl font-extrabold mb-4 tracking-tight">Halaman Akses Produk</h1>
        <p class="text-slate-400 mb-10 leading-relaxed">Terima kasih telah melakukan pembelian. Klik tombol di bawah ini untuk mengunduh produk digital Anda secara aman.</p>

        <!-- AREA TOMBOL DOWNLOAD -->
        <div class="space-y-4">
            <button onclick="ncDownload('f-245111', event)" class="btn-premium w-full py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3">
                <i data-lucide="download" class="w-6 h-6"></i>
                Download File Sekarang
            </button>
            
            <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">
                🔒 Tautan otomatis kedaluwarsa dlm 1 menit
            </p>
        </div>

        <div class="mt-12 pt-8 border-t border-white/5">
            <a href="dashboard.html" class="text-sm font-semibold text-slate-400 hover:text-white transition-colors flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Dashboard
            </a>
        </div>
    </div>

    <!-- 1. Pastikan Script Core dipanggil -->
    <script src="assets/js/nc-core.js"></script>

    <script>
        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        // Di halaman CMS asli, gas_endpoint dan userEmail sudah otomatis 
        // tersimpan di localStorage saat user melakukan login di platform utama.
        // Halaman ini akan mengambil data tersebut secara otomatis via nc-core.js.
    </script>
</body>
</html>
