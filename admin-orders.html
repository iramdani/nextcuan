    <style>
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* SweetAlert2 Dark Theme Override */
        .swal2-popup {
            background: #000028 !important;
            color: #fff !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 1.5rem !important;
        }
        .swal2-title, .swal2-html-container, .swal2-content {
            color: #fff !important;
        }
        .swal2-confirm {
            background-color: #ef4444 !important; /* Red for delete */
            border-radius: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
            font-weight: bold !important;
        }
        .swal2-cancel {
            background-color: rgba(255,255,255,0.05) !important;
            color: #94a3b8 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
            font-weight: bold !important;
        }
        .swal2-success-circular-line-left, .swal2-success-circular-line-right, .swal2-success-fix {
            background-color: transparent !important;
        }

        /* Responsive Table Optimization */
        @media (max-width: 1024px) {
            .responsive-table thead { display: none; }
            .responsive-table, .responsive-table tbody, .responsive-table tr, .responsive-table td { display: block; width: 100% !important; }
            .responsive-table tr { 
                margin-bottom: 2rem; 
                border: 1px solid rgba(255,255,255,0.1); 
                padding: 1.5rem; 
                border-radius: 1.5rem; 
                background: rgba(255,255,255,0.02);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }
            .responsive-table td { 
                display: flex; 
                flex-direction: column; /* Stacked: Label atas, Isi bawah */
                align-items: flex-start; 
                gap: 0.25rem;
                padding: 1rem 0 !important; 
                border-bottom: 1px solid rgba(255,255,255,0.05) !important; 
                text-align: left !important;
                min-height: auto;
            }
            .responsive-table td:last-child { border-bottom: none !important; }
            .responsive-table td::before { 
                content: attr(data-label); 
                font-weight: 800; 
                font-size: 9px; 
                text-transform: uppercase; 
                color: #64748b; 
                letter-spacing: 0.1em;
                margin-right: 0;
                margin-bottom: 0.25rem;
            }
            .responsive-table td > div, .responsive-table td > p { width: 100%; text-align: left !important; }
            .responsive-table td.text-right { text-align: left !important; }
        }

        /* Desktop Optimization (Integrated Mode) */
        .iframe-mode main {
            max-width: 100% !important;
            padding-left: 1rem !important;
            padding-right: 1rem !important;
        }
    </style>

<body class="bg-[#000018] text-white font-sans">
    <script>
        (function(){
            // 0. Redirect jika diakses langsung (bukan dari iframe/admin-area)
            if (window.self === window.top) {
                window.location.replace("admin-area.html");
                return;
            }

            // 1. Cek Login Admin Area (Prioritas)
            const role = String(sessionStorage.getItem('auth_role') || '').toLowerCase();
            const isUnifiedAdmin = sessionStorage.getItem('auth_v1') === 'true' && role === 'admin' && !!sessionStorage.getItem('auth_session_token');
            if(isUnifiedAdmin) {
                return; // Akses diterima sebagai Admin Area
            }

            // 2. Cek Login Member Area
            const em = sessionStorage.getItem('user_email');
            if(!em) { window.location.replace('login.html'); return; }
            
            // 3. Validasi Role Admin dari Data Dashboard
            const c = localStorage.getItem('cepat_dashboard_data_' + em);
            let isAdmin = false;
            if(c) {
                try {
                    const d = JSON.parse(c);
                    if(d.user && d.user.role === 'admin') isAdmin = true;
                } catch(e) {}
            }
            
            if(!isAdmin) {
                alert('Akses Ditolak: Hanya Admin yang diizinkan mengakses halaman ini.');
                window.location.replace('dashboard.html');
            }
        })();
    </script>

    <script>
        // CONFIGURATION — Dynamic lookup from encrypted config.js
        function getApiUrl() {
            return window.SCRIPT_URL || (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : null);
        }
        let currentPage = 1;
        let currentData = [];
        let activeProductsList = [];
        let isEditing = false;

        function ensureAdminSessionActive() {
            const token = String(sessionStorage.getItem('auth_session_token') || '');
            const role = String(sessionStorage.getItem('auth_role') || '').toLowerCase();
            const hasUnifiedSession = sessionStorage.getItem('auth_v1') === 'true' && role === 'admin' && !!token;
            if (!hasUnifiedSession) {
                Swal.fire('Sesi Tidak Valid', 'Sesi admin tidak valid. Silakan login ulang.', 'warning')
                    .then(() => window.top.location.replace('admin-area.html'));
                return false;
            }
            return true;
        }

        function buildAdminAuthPayload(payload) {
            if (!ensureAdminSessionActive()) throw new Error('Sesi admin tidak valid.');
            return Object.assign({}, payload || {}, {
                auth_session_token: sessionStorage.getItem('auth_session_token') || '',
                auth_role: sessionStorage.getItem('auth_role') || ''
            });
        }

        // ON LOAD
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchOrders(1);
            loadActiveProducts();
            
            // Search debounce
            let timeout = null;
            document.getElementById('searchInput').addEventListener('keyup', function(e) {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    fetchOrders(1, e.target.value);
                }, 500);
            });
        });

        // LOADING STATE
        function setLoading(active) {
            const el = document.getElementById('loading');
            if (active) el.classList.add('active');
            else el.classList.remove('active');
        }

        // FETCH ACTIVE PRODUCTS
        async function loadActiveProducts() {
            try {
                const API_URL = getApiUrl();
                if (!API_URL) return;
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload({ action: 'get_admin_data' }))
                });
                const json = await res.json();
                if (json.status === 'success') {
                    // product is at index 0..n where 0 is id, 1 is name, 4 is price, 5 is status (Active), 15 is hidden
                    activeProductsList = json.products.filter(p => String(p[5] || '').trim() === 'Active' && String(p[15] || 'false') !== 'true');
                    populateProductDropdown();
                }
            } catch (e) {
                console.error('Gagal memuat produk', e);
            }
        }

        function populateProductDropdown() {
            const select = document.getElementById('inputNamaProduk');
            if(!select) return;
            select.innerHTML = '<option value="">Pilih Produk Aktif...</option>';
            activeProductsList.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p[1]; 
                opt.text = p[1];
                opt.dataset.id = p[0];
                opt.dataset.price = p[4];
                select.appendChild(opt);
            });
        }

        function onProductSelect(selectEl) {
            const selectedOpt = selectEl.options[selectEl.selectedIndex];
            document.getElementById('inputIdProduk').value = selectedOpt.dataset.id || '';
            document.getElementById('inputHarga').value = selectedOpt.dataset.price || '';
        }

        // FETCH ORDERS (READ)
        async function fetchOrders(page, search = "") {
            const API_URL = getApiUrl();
            if (!API_URL) {
                console.error('[Config] SCRIPT_URL tidak tersedia');
                Swal.fire('Error', 'Konfigurasi API belum siap. Pastikan config.js termuat. Coba refresh.', 'error');
                return;
            }
            setLoading(true);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload({
                        action: 'get_admin_orders',
                        page: page,
                        limit: 20,
                        search: search
                    }))
                });
                
                const json = await res.json();
                
                if (json.status === 'success') {
                    currentData = json.data;
                    renderTable(json.data);
                    updatePagination(page, json.has_more, json.data.length);
                    currentPage = page;
                } else {
                    Swal.fire('Error', json.message, 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Gagal memuat data. ' + (error.message || 'Cek koneksi.'), 'error');
            } finally {
                setLoading(false);
            }
        }

        // RENDER TABLE
        function renderTable(data) {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400 italic text-sm">Tidak ada data ditemukan</td></tr>`;
                return;
            }

            data.forEach(item => {
                if (!item || !Array.isArray(item)) return;
                // Mapping columns based on typical structure: [Inv, Email, Name, WA, Pid, Pname, Price, Status, Date, Aff, Comm, isExcluded]
                const inv = item[0] || '-';
                const email = item[1] || '-';
                const name = item[2] || '-';
                const pname = item[5] || '-';
                const price = Number(item[6] || 0).toLocaleString('id-ID');
                let status = String(item[7] || '').trim();
                const isExcluded = String(item[11] || '') === 'TRUE';
                
                const statusLower = status.toLowerCase();
                
                let date = '-';
                if (item[8]) {
                    try {
                        const d = new Date(item[8]);
                        if (!isNaN(d.getTime())) date = d.toLocaleDateString('id-ID');
                        else date = String(item[8]);
                    } catch (e) {
                        date = String(item[8]);
                    }
                }
                let bgColor, textColor, borderColor;
                if (statusLower === 'lunas') {
                    bgColor = 'rgba(16,185,129,0.15)'; textColor = '#34d399'; borderColor = 'rgba(16,185,129,0.3)';
                } else if (statusLower === 'pending') {
                    bgColor = 'rgba(245,158,11,0.15)'; textColor = '#fbbf24'; borderColor = 'rgba(245,158,11,0.3)';
                } else if (statusLower === 'batal' || statusLower === 'failed') {
                    bgColor = 'rgba(244,63,94,0.15)'; textColor = '#fb7185'; borderColor = 'rgba(244,63,94,0.3)';
                } else {
                    bgColor = 'rgba(100,116,139,0.1)'; textColor = '#94a3b8'; borderColor = 'rgba(100,116,139,0.2)';
                }
                
                if (isExcluded) {
                   status += " (Manual)";
                }
                
                let statusBadge = `<span class="inline-block px-3 py-1.5 text-[10px] font-bold rounded-full border" style="background-color: ${bgColor}; color: ${textColor}; border-color: ${borderColor};">${status}</span>`;

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[rgba(255,255,255,0.02)] transition-colors group';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono font-bold text-[#B6FF00]" data-label="Invoice">${inv}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400" data-label="Tanggal"><div>${date}</div></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-white" data-label="Pelanggan">
                        <div class="flex flex-col">
                            <div class="font-bold">${name}</div>
                            <div class="text-[11px] text-slate-400 mt-1">${email}</div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-300 md:whitespace-nowrap" data-label="Produk"><div class="whitespace-normal break-words leading-relaxed">${pname}</div></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-white font-mono font-bold" data-label="Total"><div>Rp ${price}</div></td>
                    <td class="px-6 py-4 whitespace-nowrap" data-label="Status">
                        <div>${statusBadge}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium" data-label="Aksi">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="editOrder('${inv}')" class="text-slate-400 hover:text-[#B6FF00] transition-colors bg-[rgba(255,255,255,0.05)] p-2 rounded-lg" title="Edit"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteOrder('${inv}')" class="text-slate-400 hover:text-[#ef4444] transition-colors bg-[rgba(255,255,255,0.05)] p-2 rounded-lg" title="Hapus"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        // PAGINATION
        function updatePagination(page, hasMore, count = 0) {
            // Update Text X sampai Y
            const limit = 20;
            const start = count > 0 ? (page - 1) * limit + 1 : 0;
            const end = count > 0 ? (page - 1) * limit + count : 0;
            
            const pStart = document.getElementById('pageStart');
            const pEnd = document.getElementById('pageEnd');
            if(pStart) pStart.innerText = start;
            if(pEnd) pEnd.innerText = end;

            document.getElementById('pageInfo').innerText = `Halaman ${page}`;
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = !hasMore;
            
            // Simple visual feedback
            if (page === 1) document.getElementById('prevBtn').classList.add('opacity-50', 'cursor-not-allowed');
            else document.getElementById('prevBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            
            if (!hasMore) document.getElementById('nextBtn').classList.add('opacity-50', 'cursor-not-allowed');
            else document.getElementById('nextBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1) return;
            fetchOrders(newPage);
        }

        // MODAL FUNCTIONS
        function openModal(mode, data = null) {
            const modal = document.getElementById('orderModal');
            const title = document.getElementById('modalTitle');
            
            // Reset Form
            document.getElementById('orderId').value = '';
            document.getElementById('inputNama').value = '';
            document.getElementById('inputEmail').value = '';
            document.getElementById('inputWa').value = '';
            document.getElementById('inputIdProduk').value = '';
            document.getElementById('inputNamaProduk').value = '';
            document.getElementById('inputHarga').value = '';
            document.getElementById('inputStatus').value = 'Pending';
            document.getElementById('inputExcludeStats').checked = false;

            if (mode === 'edit' && data) {
                isEditing = true;
                title.innerText = 'Edit Order ' + data[0];
                document.getElementById('orderId').value = data[0]; // Inv as ID
                document.getElementById('inputEmail').value = data[1];
                document.getElementById('inputNama').value = data[2];
                document.getElementById('inputWa').value = data[3];
                document.getElementById('inputIdProduk').value = data[4];
                document.getElementById('inputNamaProduk').value = data[5];
                document.getElementById('inputHarga').value = data[6];
                document.getElementById('inputStatus').value = data[7];
                if(data[11] === 'TRUE') document.getElementById('inputExcludeStats').checked = true;
                
                // Disable ID fields in edit mode
                document.getElementById('inputEmail').readOnly = true;
            } else {
                isEditing = false;
                title.innerText = 'Tambah Order Baru';
                document.getElementById('inputEmail').readOnly = false;
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        // CRUD ACTIONS
        function editOrder(inv) {
            const item = currentData.find(d => d[0] === inv);
            if (item) openModal('edit', item);
        }

        async function saveOrder() {
            const payload = {
                action: isEditing ? 'update_order_status' : 'create_order',
                id: document.getElementById('orderId').value, // Only for update
                nama: document.getElementById('inputNama').value,
                email: document.getElementById('inputEmail').value,
                whatsapp: document.getElementById('inputWa').value,
                id_produk: document.getElementById('inputIdProduk').value,
                nama_produk: document.getElementById('inputNamaProduk').value,
                harga: document.getElementById('inputHarga').value,
                status: document.getElementById('inputStatus').value,
                exclude_statistic: document.getElementById('inputExcludeStats').checked
            };

            // Basic Validation
            if (!payload.nama || !payload.email || !payload.harga) {
                Swal.fire('Validasi', 'Mohon lengkapi data wajib (Nama, Email, Harga)', 'warning');
                return;
            }

            setLoading(true);
            try {
                const res = await fetch(getApiUrl(), {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload(payload))
                });
                const json = await res.json();
                
                if (json.status === 'success') {
                    Swal.fire('Sukses', isEditing ? 'Order diperbarui' : 'Order berhasil dibuat', 'success');
                    closeModal();
                    fetchOrders(currentPage);
                } else {
                    Swal.fire('Gagal', json.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', e.toString(), 'error');
            } finally {
                setLoading(false);
            }
        }

        function deleteOrder(inv) {
            Swal.fire({
                title: 'Hapus Order?',
                text: `Anda yakin ingin menghapus invoice ${inv}? Tindakan ini tidak bisa dibatalkan.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    setLoading(true);
                    try {
                        const res = await fetch(getApiUrl(), {
                            method: 'POST',
                            body: JSON.stringify(buildAdminAuthPayload({
                                action: 'delete_order',
                                id: inv
                            }))
                        });
                        const json = await res.json();
                        if (json.status === 'success') {
                            Swal.fire('Terhapus!', 'Data order telah dihapus.', 'success');
                            fetchOrders(currentPage);
                        } else {
                            Swal.fire('Gagal', json.message, 'error');
                        }
                    } catch (e) {
                        Swal.fire('Error', e.toString(), 'error');
                    } finally {
                        setLoading(false);
                    }
                }
            });
        }
    </script>
</body>
</html>
