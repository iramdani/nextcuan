<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Orderan - Admin Area</title>
    <!-- Config -->
    <script src="site.config.js"></script>
    <script src="config.js?v=2026_2"></script>
    <!-- Tailwind CSS & Theme -->
    <link rel="preload" as="style" href="assets/theme.css">
    <link rel="stylesheet" href="assets/theme.css">
    <link rel="preload" as="style" href="tailwind.css?v=2026_1">
    <link rel="stylesheet" href="tailwind.css?v=2026_1">
    <!-- SweetAlert2 -->
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="assets/vendor/lucide.min.js?v=0.577.0"></script>
    
    <style>
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* SweetAlert2 Dark Theme Override */
        .swal2-popup {
            background: #000028 !important;
            color: #fff !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 1.5rem !important;
        }
        .swal2-title, .swal2-html-container, .swal2-content {
            color: #fff !important;
        }
        .swal2-confirm {
            background-color: #ef4444 !important; /* Red for delete */
            border-radius: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
            font-weight: bold !important;
        }
        .swal2-cancel {
            background-color: rgba(255,255,255,0.05) !important;
            color: #94a3b8 !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1.5rem !important;
            font-weight: bold !important;
        }
        .swal2-success-circular-line-left, .swal2-success-circular-line-right, .swal2-success-fix {
            background-color: transparent !important;
        }
    </style>
</head>
<body class="bg-[#000018] text-white font-sans">
    <script>
        (function(){
            // 0. Redirect jika diakses langsung (bukan dari iframe/admin-area)
            if (window.self === window.top) {
                window.location.replace("admin-area.html");
                return;
            }

            // 1. Cek Login Admin Area (Prioritas)
            const role = String(sessionStorage.getItem('auth_role') || '').toLowerCase();
            const isUnifiedAdmin = sessionStorage.getItem('auth_v1') === 'true' && role === 'admin' && !!sessionStorage.getItem('auth_session_token');
            if(isUnifiedAdmin) {
                return; // Akses diterima sebagai Admin Area
            }

            // 2. Cek Login Member Area
            const em = sessionStorage.getItem('user_email');
            if(!em) { window.location.replace('login.html'); return; }
            
            // 3. Validasi Role Admin dari Data Dashboard
            const c = localStorage.getItem('cepat_dashboard_data_' + em);
            let isAdmin = false;
            if(c) {
                try {
                    const d = JSON.parse(c);
                    if(d.user && d.user.role === 'admin') isAdmin = true;
                } catch(e) {}
            }
            
            if(!isAdmin) {
                alert('Akses Ditolak: Hanya Admin yang diizinkan mengakses halaman ini.');
                window.location.replace('dashboard.html');
            }
        })();
    </script>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-[#000018]/80 z-[100] flex flex-col items-center justify-center overflow-hidden transition-opacity duration-300 hidden">
        <i data-lucide="loader" class="w-10 h-10 animate-spin text-[#B6FF00]"></i>
    </div>

    <!-- Header -->
    <header class="bg-[#000010] shadow-[0_4px_20px_rgba(0,0,0,0.5)] sticky top-0 z-10 border-b border-[rgba(255,255,255,0.05)]" id="main-header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-white flex items-center gap-2">
                <i data-lucide="shopping-cart" class="w-5 h-5 text-[#B6FF00]"></i> Data Orderan
            </h1>
            <div class="flex items-center gap-3">
                <button onclick="window.close()" class="text-slate-400 hover:text-white transition-colors text-sm flex items-center gap-2">
                    <i data-lucide="x" class="w-4 h-4"></i> Tutup
                </button>
            </div>
        </div>
    </header>

    <script>
        // Hide header if inside iframe (integrated mode)
        if (window.self !== window.top) {
            document.getElementById('main-header').style.display = 'none';
        }
    </script>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Toolbar -->
        <div class="glass-card p-4 rounded-xl shadow-none border border-[rgba(255,255,255,0.05)] mb-6 flex flex-col sm:flex-row justify-between items-center gap-4 relative overflow-hidden">
            <div class="absolute inset-0 bg-[#B6FF00]/5 opacity-20 pointer-events-none"></div>
            <div class="flex gap-2 w-full sm:w-auto relative z-10">
                <div class="relative w-full sm:w-64">
                    <input type="text" id="searchInput" placeholder="Cari Invoice, Email, atau Nama..." 
                           class="w-full pl-10 pr-4 py-2 border-transparent bg-[rgba(255,255,255,0.05)] rounded-lg focus:ring-2 focus:ring-[#B6FF00] focus:outline-none text-sm text-white placeholder-slate-500 transition-all" style="background: rgba(255, 255, 255, 0.05);">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-500"></i>
                </div>
                <button onclick="fetchOrders(1)" class="bg-[rgba(255,255,255,0.1)] hover:bg-[#B6FF00] hover:text-black hover:border-transparent text-white border border-[rgba(255,255,255,0.2)] px-4 py-2 rounded-lg text-sm transition-all shadow-[0_0_15px_rgba(182,255,0,0)] hover:shadow-[0_0_15px_rgba(182,255,0,0.4)]">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </button>
            </div>
            
            <button id="btn-add-order" onclick="openModal('create')" class="w-full sm:w-auto bg-[#B6FF00] hover:bg-[#a3e600] text-black px-4 py-2 rounded-lg shadow-[0_0_15px_rgba(182,255,0,0.3)] transition-all font-bold text-sm flex items-center justify-center gap-2 relative z-10">
                <i data-lucide="plus" class="w-4 h-4"></i> Tambah Order
            </button>
        </div>

        <!-- Table Container -->
        <div class="glass-card rounded-xl shadow-none border border-[rgba(255,255,255,0.05)] overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-[rgba(255,255,255,0.05)]">
                    <thead class="bg-[rgba(255,255,255,0.02)]">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Invoice</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Tanggal</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Pelanggan</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Produk</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Total</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Status</th>
                            <th class="px-6 py-4 text-right text-xs font-bold text-slate-400 uppercase tracking-widest border-b border-[rgba(255,255,255,0.05)]">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody" class="divide-y divide-[rgba(255,255,255,0.05)]">
                        <!-- Data will be injected here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="bg-[rgba(255,255,255,0.02)] px-4 py-4 flex items-center justify-between border-t border-[rgba(255,255,255,0.05)] sm:px-6">
                <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm text-slate-400">
                            Menampilkan <span class="font-bold text-white" id="pageStart">0</span> sampai <span class="font-bold text-white" id="pageEnd">0</span>
                        </p>
                    </div>
                    <div>
                        <nav class="relative z-0 inline-flex rounded-lg shadow-sm -space-x-px border border-[rgba(255,255,255,0.1)] overflow-hidden" aria-label="Pagination">
                            <button id="prevBtn" onclick="changePage(-1)" class="relative inline-flex items-center px-3 py-2 bg-[rgba(255,255,255,0.05)] text-sm font-medium text-white hover:bg-[#B6FF00] hover:text-black transition-colors disabled:opacity-50">
                                <span class="sr-only">Previous</span>
                                <i data-lucide="chevron-left" class="h-4 w-4"></i>
                            </button>
                            <span id="pageInfo" class="relative inline-flex items-center px-4 py-2 bg-[rgba(255,255,255,0.02)] border-x border-[rgba(255,255,255,0.1)] text-sm font-bold text-white">
                                Page 1
                            </span>
                            <button id="nextBtn" onclick="changePage(1)" class="relative inline-flex items-center px-3 py-2 bg-[rgba(255,255,255,0.05)] text-sm font-medium text-white hover:bg-[#B6FF00] hover:text-black transition-colors disabled:opacity-50">
                                <span class="sr-only">Next</span>
                                <i data-lucide="chevron-right" class="h-4 w-4"></i>
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal Form -->
    <div id="orderModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-[#000018]/80 backdrop-blur-sm transition-opacity" aria-hidden="true" onclick="closeModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom glass-card border border-[rgba(255,255,255,0.1)] rounded-2xl text-left overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.5)] transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <div class="px-6 pt-6 pb-4 border-b border-[rgba(255,255,255,0.05)]">
                    <h3 class="text-xl font-bold text-white tracking-tight" id="modalTitle">Tambah Order Baru</h3>
                </div>
                <div class="px-6 py-5 space-y-4">
                    <input type="hidden" id="orderId">
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">Nama Pelanggan</label>
                        <input type="text" id="inputNama" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">Email</label>
                        <input type="email" id="inputEmail" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">WhatsApp</label>
                        <input type="text" id="inputWa" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all" placeholder="628xxx">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">ID Produk</label>
                            <input type="text" id="inputIdProduk" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">Nama Produk</label>
                            <input type="text" id="inputNamaProduk" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">Harga Total</label>
                        <input type="number" id="inputHarga" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-1.5 ml-0.5">Status</label>
                        <select id="inputStatus" class="glass-input w-full rounded-xl py-3 px-4 text-sm text-white focus:outline-none transition-all [&>option]:bg-[#000018]">
                            <option value="Pending">Pending</option>
                            <option value="Lunas">Lunas</option>
                            <option value="Batal">Batal</option>
                        </select>
                    </div>
                </div>
                <div class="px-6 py-4 bg-[rgba(0,0,0,0.2)] border-t border-[rgba(255,255,255,0.05)] sm:flex sm:flex-row-reverse gap-3">
                    <button id="btn-save-order" type="button" onclick="saveOrder()" class="w-full inline-flex justify-center rounded-xl px-6 py-3 bg-[#B6FF00] text-sm font-bold text-black hover:bg-[#a3e600] focus:outline-none transition-colors sm:w-auto shadow-[0_0_15px_rgba(182,255,0,0.3)]">
                        Simpan Order
                    </button>
                    <button type="button" onclick="closeModal()" class="mt-3 w-full inline-flex justify-center rounded-xl border border-[rgba(255,255,255,0.1)] shadow-sm px-6 py-3 bg-[rgba(255,255,255,0.05)] text-sm font-bold text-slate-300 hover:bg-[rgba(255,255,255,0.1)] hover:text-white focus:outline-none transition-colors sm:mt-0 sm:w-auto">
                        Batal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION — Dynamic lookup from encrypted config.js
        function getApiUrl() {
            return window.SCRIPT_URL || (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : null);
        }
        let currentPage = 1;
        let currentData = [];
        let isEditing = false;

        function ensureAdminSessionActive() {
            const token = String(sessionStorage.getItem('auth_session_token') || '');
            const role = String(sessionStorage.getItem('auth_role') || '').toLowerCase();
            const hasUnifiedSession = sessionStorage.getItem('auth_v1') === 'true' && role === 'admin' && !!token;
            if (!hasUnifiedSession) {
                Swal.fire('Sesi Tidak Valid', 'Sesi admin tidak valid. Silakan login ulang.', 'warning')
                    .then(() => window.top.location.replace('admin-area.html'));
                return false;
            }
            return true;
        }

        function buildAdminAuthPayload(payload) {
            if (!ensureAdminSessionActive()) throw new Error('Sesi admin tidak valid.');
            return Object.assign({}, payload || {}, {
                auth_session_token: sessionStorage.getItem('auth_session_token') || '',
                auth_role: sessionStorage.getItem('auth_role') || ''
            });
        }

        // ON LOAD
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchOrders(1);
            
            // Search debounce
            let timeout = null;
            document.getElementById('searchInput').addEventListener('keyup', function(e) {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    fetchOrders(1, e.target.value);
                }, 500);
            });
        });

        // LOADING STATE
        function setLoading(active) {
            const el = document.getElementById('loading');
            if (active) el.classList.add('active');
            else el.classList.remove('active');
        }

        // FETCH ORDERS (READ)
        async function fetchOrders(page, search = "") {
            const API_URL = getApiUrl();
            if (!API_URL) {
                console.error('[Config] SCRIPT_URL tidak tersedia');
                Swal.fire('Error', 'Konfigurasi API belum siap. Pastikan config.js termuat. Coba refresh.', 'error');
                return;
            }
            setLoading(true);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload({
                        action: 'get_admin_orders',
                        page: page,
                        limit: 20,
                        search: search
                    }))
                });
                
                const json = await res.json();
                
                if (json.status === 'success') {
                    currentData = json.data;
                    renderTable(json.data);
                    updatePagination(page, json.has_more, json.data.length);
                    currentPage = page;
                } else {
                    Swal.fire('Error', json.message, 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('Error', 'Gagal memuat data. Cek koneksi.', 'error');
            } finally {
                setLoading(false);
            }
        }

        // RENDER TABLE
        function renderTable(data) {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-400 italic text-sm">Tidak ada data ditemukan</td></tr>`;
                return;
            }

            data.forEach(item => {
                // Mapping columns based on typical structure: [Inv, Email, Name, WA, Pid, Pname, Price, Status, Date, Aff, Comm]
                const inv = item[0];
                const email = item[1];
                const name = item[2];
                const pname = item[5];
                const price = Number(item[6]).toLocaleString('id-ID');
                const status = item[7];
                const date = item[8] ? new Date(item[8]).toLocaleDateString('id-ID') : '-';
                
                let statusBadge = '';
                if (status === 'Lunas') statusBadge = '<span class="px-3 py-1 inline-flex text-[10px] font-bold rounded-full bg-[rgba(182,255,0,0.1)] text-[#B6FF00] border border-[rgba(182,255,0,0.2)]">Lunas</span>';
                else if (status === 'Pending') statusBadge = '<span class="px-3 py-1 inline-flex text-[10px] font-bold rounded-full bg-[rgba(245,158,11,0.1)] text-[#f59e0b] border border-[rgba(245,158,11,0.2)]">Pending</span>';
                else statusBadge = '<span class="px-3 py-1 inline-flex text-[10px] font-bold rounded-full bg-[rgba(239,68,68,0.1)] text-[#ef4444] border border-[rgba(239,68,68,0.2)]">Batal</span>';

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[rgba(255,255,255,0.02)] transition-colors group';
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono font-bold text-[#B6FF00]">${inv}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${date}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-white">
                        <div class="font-bold">${name}</div>
                        <div class="text-[11px] text-slate-400 mt-1">${email}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300">${pname}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-white font-mono font-bold">Rp ${price}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${statusBadge}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick="editOrder('${inv}')" class="text-slate-400 hover:text-[#B6FF00] mr-3 transition-colors bg-[rgba(255,255,255,0.05)] p-2 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                        <button onclick="deleteOrder('${inv}')" class="text-slate-400 hover:text-[#ef4444] transition-colors bg-[rgba(255,255,255,0.05)] p-2 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        // PAGINATION
        function updatePagination(page, hasMore, count = 0) {
            // Update Text X sampai Y
            const limit = 20;
            const start = count > 0 ? (page - 1) * limit + 1 : 0;
            const end = count > 0 ? (page - 1) * limit + count : 0;
            
            const pStart = document.getElementById('pageStart');
            const pEnd = document.getElementById('pageEnd');
            if(pStart) pStart.innerText = start;
            if(pEnd) pEnd.innerText = end;

            document.getElementById('pageInfo').innerText = `Halaman ${page}`;
            document.getElementById('prevBtn').disabled = page === 1;
            document.getElementById('nextBtn').disabled = !hasMore;
            
            // Simple visual feedback
            if (page === 1) document.getElementById('prevBtn').classList.add('opacity-50', 'cursor-not-allowed');
            else document.getElementById('prevBtn').classList.remove('opacity-50', 'cursor-not-allowed');
            
            if (!hasMore) document.getElementById('nextBtn').classList.add('opacity-50', 'cursor-not-allowed');
            else document.getElementById('nextBtn').classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1) return;
            fetchOrders(newPage);
        }

        // MODAL FUNCTIONS
        function openModal(mode, data = null) {
            const modal = document.getElementById('orderModal');
            const title = document.getElementById('modalTitle');
            
            // Reset Form
            document.getElementById('orderId').value = '';
            document.getElementById('inputNama').value = '';
            document.getElementById('inputEmail').value = '';
            document.getElementById('inputWa').value = '';
            document.getElementById('inputIdProduk').value = '';
            document.getElementById('inputNamaProduk').value = '';
            document.getElementById('inputHarga').value = '';
            document.getElementById('inputStatus').value = 'Pending';

            if (mode === 'edit' && data) {
                isEditing = true;
                title.innerText = 'Edit Order ' + data[0];
                document.getElementById('orderId').value = data[0]; // Inv as ID
                document.getElementById('inputEmail').value = data[1];
                document.getElementById('inputNama').value = data[2];
                document.getElementById('inputWa').value = data[3];
                document.getElementById('inputIdProduk').value = data[4];
                document.getElementById('inputNamaProduk').value = data[5];
                document.getElementById('inputHarga').value = data[6];
                document.getElementById('inputStatus').value = data[7];
                
                // Disable ID fields in edit mode
                document.getElementById('inputEmail').readOnly = true;
                document.getElementById('inputIdProduk').readOnly = true;
            } else {
                isEditing = false;
                title.innerText = 'Tambah Order Baru';
                document.getElementById('inputEmail').readOnly = false;
                document.getElementById('inputIdProduk').readOnly = false;
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        // CRUD ACTIONS
        function editOrder(inv) {
            const item = currentData.find(d => d[0] === inv);
            if (item) openModal('edit', item);
        }

        async function saveOrder() {
            const payload = {
                action: isEditing ? 'update_order_status' : 'create_order',
                id: document.getElementById('orderId').value, // Only for update
                nama: document.getElementById('inputNama').value,
                email: document.getElementById('inputEmail').value,
                whatsapp: document.getElementById('inputWa').value,
                id_produk: document.getElementById('inputIdProduk').value,
                nama_produk: document.getElementById('inputNamaProduk').value,
                harga: document.getElementById('inputHarga').value,
                status: document.getElementById('inputStatus').value
            };

            // Basic Validation
            if (!payload.nama || !payload.email || !payload.harga) {
                Swal.fire('Validasi', 'Mohon lengkapi data wajib (Nama, Email, Harga)', 'warning');
                return;
            }

            setLoading(true);
            try {
                const res = await fetch(getApiUrl(), {
                    method: 'POST',
                    body: JSON.stringify(buildAdminAuthPayload(payload))
                });
                const json = await res.json();
                
                if (json.status === 'success') {
                    Swal.fire('Sukses', isEditing ? 'Order diperbarui' : 'Order berhasil dibuat', 'success');
                    closeModal();
                    fetchOrders(currentPage);
                } else {
                    Swal.fire('Gagal', json.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', e.toString(), 'error');
            } finally {
                setLoading(false);
            }
        }

        function deleteOrder(inv) {
            Swal.fire({
                title: 'Hapus Order?',
                text: `Anda yakin ingin menghapus invoice ${inv}? Tindakan ini tidak bisa dibatalkan.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Hapus!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    setLoading(true);
                    try {
                        const res = await fetch(getApiUrl(), {
                            method: 'POST',
                            body: JSON.stringify(buildAdminAuthPayload({
                                action: 'delete_order',
                                id: inv
                            }))
                        });
                        const json = await res.json();
                        if (json.status === 'success') {
                            Swal.fire('Terhapus!', 'Data order telah dihapus.', 'success');
                            fetchOrders(currentPage);
                        } else {
                            Swal.fire('Gagal', json.message, 'error');
                        }
                    } catch (e) {
                        Swal.fire('Error', e.toString(), 'error');
                    } finally {
                        setLoading(false);
                    }
                }
            });
        }
    </script>
</body>
</html>
